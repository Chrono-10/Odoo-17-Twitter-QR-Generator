version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  odoo17:
    image: odoo:17.0 # Use custom image later
    depends_on:
      - db
    ports:
      - "8067:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo # mount odoo.conf
      - ./addons:/mnt/extra-addons # only for local testing

volumes:
  odoo-web-data:
  odoo-db-data:
